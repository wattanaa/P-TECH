้สอบบัญชีวิชาชีพและการวางแผนภาษีเชิงลึก"],careerPaths:["ผู้ช่วยผู้สอบบัญชีรับอนุญาต (Audit Assistant)","หัวหน้าฝ่ายบัญชีและการเงินของบริษัทชั้นนำ","นักวิเคราะห์ระบบข้อมูลบัญชี (Accounting System Analyst)","ผู้ตรวจสอบภายในองค์กรภาครัฐหรือเอกชน"],icon:"TrendingUp"}],N2=[{id:"news-1",title:"วิทยาลัยเทคโนโลยีปทุมรัตต์ เปิดรับสมัครนักศึกษาใหม่ ประจำปีการศึกษา 2570 แล้ววันนี้!",excerpt:"ข่าวดีสำหรับน้องๆ ที่สำเร็จการศึกษาชั้น ม.3, ม.6 หรือเทียบเท่า เปิดรับสมัครทั้งระดับ ปวช. และ ปวส. เรียนเน้นทักษะปฏิบัติงานจริง อุปกรณ์ครบครัน พร้อมโควตาพิเศษมากมาย",content:`วิทยาลัยเทคโนโลยีปทุมรัตต์ (PTC) ยินดีต้อนรับผู้ที่กำลังจะสำเร็จการศึกษาและสนใจเข้าศึกษาต่อสายอาชีพ โดยในปีการศึกษา 2570 นี้ ทางวิทยาลัยเปิดรับสมัครนักศึกษาในหลากหลายสาขาวิชาชีพ ทั้งสายช่างอุตสาหกรรม และสายบริหารธุรกิจ ดิจิทัลไอที

**สิทธิพิเศษสำหรับผู้สมัครล่วงหน้า:**
1. รับส่วนลดค่าอุปกรณ์การเรียนพิเศษ
2. โควตาฟรีค่าบำรุงการศึกษาวิชาการในเทอมแรก (ตามเงื่อนไขเกรดเฉลี่ย)
3. สิทธิ์จัดหาหอพักนักศึกษาพันธมิตรในราคาพิเศษรอบวิทยาลัย
4. ทุนการศึกษา 'เรียนดีแต่ขาดแคลนทุนทรัพย์'

**กำหนดการสมัครเรียน:**
- สมัครทางออนไลน์: ตั้งแต่วันนี้เป็นต้นไป ตลอด 24 ชั่วโมง
- สมัครด้วยตนเองที่วิทยาลัยฯ: ทุกวันจันทร์ - วันอาทิตย์ (ไม่เว้นวันหยุดราชการ) เวลา 08.30 น. - 16.30 น.

สามารถสมัครผ่านเมนู 'สมัครเรียนออนไลน์' ในเว็บไซต์นี้ได้ทันที หรือติดต่อแอดมินทางเพจวิทยาลัยเพื่อสอบถามรายละเอียดเพิ่มเติม`,date:"2026-06-25",category:"ข่าวประชาสัมพันธ์",imageUrl:"https://images.unsplash.com/photo-1523050854058-8df90110c9f1?w=800&auto=format&fit=crop",views:342},{id:"news-2",title:"ความสำเร็จอันยิ่งใหญ่! นักศึกษาแผนกไอทีคว้ารางวัลชนะเลิศการประกวดนวัตกรรม IoT ระดับภูมิภาค",excerpt:"ขอแสดงความยินดีกับทีม 'PTC Smart Farm' นักศึกษาสาขาเทคโนโลยีสารสนเทศ วิทยาลัยเทคโนโลยีปทุมรัตต์ คว้ารางวัลชนะเลิศอันดับหนึ่งจากการประกวดสิ่งประดิษฐ์สมาร์ทฟาร์มด้วย IoT",content:`เมื่อสัปดาห์ที่ผ่านมา ทีมนักศึกษาแผนกเทคโนโลยีสารสนเทศของวิทยาลัยเทคโนโลยีปทุมรัตต์ ได้ส่งผลงานเข้าประกวดในการแข่งขัน 'นวัตกรรมเทคโนโลยีเพื่อชุมชนประจำปี 2026' ระดับภาคตะวันออกเฉียงเหนือ

ทีม 'PTC Smart Farm' นำเสนอโปรเจกต์ 'ระบบรดน้ำอัจฉริยะวิเคราะห์ความชื้นและสภาพดินด้วยระบบคลาวด์' ซึ่งช่วยเกษตรกรในอำเภอปทุมรัตต์ควบคุมการใช้น้ำได้อย่างมีประสิทธิภาพ ประหยัดน้ำได้ถึง 40% และเพิ่มผลผลิตทางการเกษตร โดยสามารถวิเคราะห์และสั่งงานผ่านมือถือได้แบบเรียลไทม์

ผลงานชิ้นนี้ได้รับการชื่นชมจากคณะกรรมการผู้ทรงคุณวุฒิทั้งเรื่องแนวคิดที่ใช้ได้จริง ประสิทธิภาพทางวิศวกรรม และความคุ้มทุน คว้ารางวัลชนะเลิศอันดับหนึ่งมาครองได้สำเร็จ และได้รับทุนสนับสนุนการพัฒนาผลงานเพิ่มขึ้นอีก 50,000 บาท

วิทยาลัยฯ ขอขอบพระคุณอาจารย์ที่ปรึกษาและทีมงานนักศึกษาทุกคนที่เสียสละเวลา ทุ่มเทแรงกายแรงใจสร้างชื่อเสียงให้แก่วิทยาลัยและท้องถิ่นปทุมรัตต์อย่างสง่างาม`,date:"2026-06-18",category:"ข่าวกิจกรรม",imageUrl:"https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?w=800&auto=format&fit=crop",views:521},{id:"news-3",title:"อบรมเชิงปฏิบัติการยกระดับวิชาชีพหัวข้อ 'เทคโนโลยียานยนต์ไฟฟ้า EV และรถยนต์ไฮบริด' สำหรับครูและนักศึกษา",excerpt:"ยกระดับทักษะก้าวทันศตวรรษที่ 21 แผนกช่างยนต์ร่วมมือกับพันธมิตรยานยนต์ชั้นนำ จัดอบรมใหญ่เจาะลึกระบบควบคุมมอเตอร์ไฟฟ้า แบตเตอรี่ลิเธียม และการบำรุงรักษารถยนต์ไฟฟ้ายุคใหม่",content:`ความเปลี่ยนแปลงของอุตสาหกรรมยานยนต์ในปัจจุบันก้าวสู่นวัตกรรมยานยนต์ไฟฟ้าอย่างเต็มตัว วิทยาลัยเทคโนโลยีปทุมรัตต์ จึงไม่หยุดยั้งที่จะปรับปรุงความรู้ของครูผู้สอนและนักศึกษาให้เท่าทันโลก

แผนกช่างยนต์วิทยาลัยเทคโนโลยีปทุมรัตต์ จึงได้ร่วมมือกับบริษัทศูนย์บริการยานยนต์ไฟฟ้าชั้นนำ จัดงานฝึกอบรมเชิงปฏิบัติการเทคโนโลยียานยนต์ไฟฟ้าและรถไฮบริด ณ อาคารอู่ปฏิบัติการเครื่องกล

ภายในงานเน้นภาคปฏิบัติอย่างเข้มข้น ประกอบด้วย:
1. ความเข้าใจระบบไฟฟ้าแรงดันสูงและการรักษาความปลอดภัยในการทำงาน
2. การวิเคราะห์วงจรควบคุมมอเตอร์และระบบระบายความร้อน
3. การใช้เครื่องสแกนปัญหาไฟฟ้าของรถยนต์ EV ยี่ห้อดัง
4. การบำรุงรักษาสภาพแบตเตอรี่ลิเธียมอย่างถูกต้อง

ด้วยวิทยาลัยฯ มีแผนพัฒนาโครงสร้างพื้นฐานดิจิทัลให้มีประสิทธิภาพสูงสุดเพื่อการเรียนรู้ของนักเรียน นักศึกษา จึงต้องการปรับปรุงห้องปฏิบัติการคอมพิวเตอร์ (IT Lab 301) และเปลี่ยนเครื่องคอมพิวเตอร์ประสิทธิภาพสูงรวม 40 เครื่อง พร้อมตู้แร็คระบบเน็ตเวิร์กสายใยแก้วนำแสง
